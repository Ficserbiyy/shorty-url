version: '3.8'

services:
  # PostgreSQL
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: shorty_db
    ports:
      - "5432:5432"

  # Redis
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # APP
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis